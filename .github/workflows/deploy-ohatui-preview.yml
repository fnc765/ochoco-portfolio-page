name: Deploy ohatui-db preview to Cloudflare Pages

on:
  push:
    branches:
      - 'claude/deploy-cloudflare-pages-gIUW7'
  workflow_dispatch:

env:
  CF_API_TOKEN: WctE7mePBsrd8bP8zKKRk9bI4d_i7kHfFKiM7-Un

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get Cloudflare Account ID
        id: cf-account
        run: |
          ACCOUNT_ID=$(curl -sf \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts" \
            | jq -r '.result[0].id')
          echo "account_id=$ACCOUNT_ID" >> "$GITHUB_OUTPUT"
          echo "Account ID: $ACCOUNT_ID"

      - name: Check / create Cloudflare Pages project
        run: |
          ACCOUNT_ID="${{ steps.cf-account.outputs.account_id }}"
          PROJECT_NAME="ohatui-db"

          STATUS=$(curl -sf \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/$ACCOUNT_ID/pages/projects/$PROJECT_NAME" \
            | jq -r '.success')

          if [ "$STATUS" = "true" ]; then
            echo "Pages project '$PROJECT_NAME' already exists."
          else
            echo "Creating Pages project '$PROJECT_NAME' ..."
            curl -sf -X POST \
              -H "Authorization: Bearer $CF_API_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"name\":\"$PROJECT_NAME\",\"production_branch\":\"main\"}" \
              "https://api.cloudflare.com/client/v4/accounts/$ACCOUNT_ID/pages/projects"
            echo "Project created."
          fi

      - name: Setup D1 database and bindings
        run: |
          ACCOUNT_ID="${{ steps.cf-account.outputs.account_id }}"

          # D1 データベースが存在しなければ作成
          DB_LIST=$(curl -sf \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/$ACCOUNT_ID/d1/database?per_page=100")
          DB_ID=$(echo "$DB_LIST" | jq -r '.result[] | select(.name == "ohatui-tweets") | .uuid')

          if [ -z "$DB_ID" ]; then
            echo "D1 database 'ohatui-tweets' を作成..."
            CREATE_RESP=$(curl -sf -X POST \
              -H "Authorization: Bearer $CF_API_TOKEN" \
              -H "Content-Type: application/json" \
              -d '{"name":"ohatui-tweets"}' \
              "https://api.cloudflare.com/client/v4/accounts/$ACCOUNT_ID/d1/database")
            DB_ID=$(echo "$CREATE_RESP" | jq -r '.result.uuid')
            echo "作成完了: $DB_ID"
          else
            echo "D1 database 'ohatui-tweets' は既に存在: $DB_ID"
          fi

          # スキーマ適用
          SQL=$(cat ohatsui/schema.sql | tr '\n' ' ' | sed "s/'/''/g")
          curl -sf -X POST \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"sql\":\"CREATE TABLE IF NOT EXISTS tweets (id TEXT PRIMARY KEY, tweet_id TEXT UNIQUE NOT NULL, text TEXT NOT NULL, created_at TEXT NOT NULL, image_url TEXT, like_count INTEGER NOT NULL DEFAULT 0, retweet_count INTEGER NOT NULL DEFAULT 0, type TEXT NOT NULL DEFAULT 'ohachoco' CHECK(type IN ('ohachoco','konchoco','konbanchoco'))); CREATE INDEX IF NOT EXISTS idx_created_at ON tweets(created_at); CREATE INDEX IF NOT EXISTS idx_type ON tweets(type);\"}" \
            "https://api.cloudflare.com/client/v4/accounts/$ACCOUNT_ID/d1/database/$DB_ID/query" \
            && echo "スキーマ適用完了" || echo "スキーマ適用済みまたはスキップ"

          # Pages プロジェクトに D1 バインディングを設定
          curl -sf -X PATCH \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"deployment_configs\":{\"production\":{\"d1_databases\":{\"DB\":{\"id\":\"$DB_ID\"}}},\"preview\":{\"d1_databases\":{\"DB\":{\"id\":\"$DB_ID\"}}}}}" \
            "https://api.cloudflare.com/client/v4/accounts/$ACCOUNT_ID/pages/projects/ohatui-db" \
            && echo "D1 バインディング設定完了"

          echo "D1_DATABASE_ID=$DB_ID" >> "$GITHUB_ENV"

      - name: Deploy ohatsui/ to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ env.CF_API_TOKEN }}
          accountId: ${{ steps.cf-account.outputs.account_id }}
          command: pages deploy ohatsui --project-name=ohatui-db --commit-dirty=true

      - name: Show deployed URL
        run: |
          ACCOUNT_ID="${{ steps.cf-account.outputs.account_id }}"
          PROJECT_NAME="ohatui-db"
          SUBDOMAIN=$(curl -sf \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/$ACCOUNT_ID/pages/projects/$PROJECT_NAME" \
            | jq -r '.result.subdomain')
          echo ""
          echo "=========================================="
          echo "  Preview URL: https://$SUBDOMAIN"
          echo "=========================================="
