name: Deploy ohatui-db to Cloudflare Pages

on:
  push:
    branches:
      - main
      - ohatui-db
    paths:
      - 'ohatsui/**'
      - '.github/workflows/deploy-ohatui-preview.yml'
  workflow_dispatch:

env:
  CF_API_TOKEN: WctE7mePBsrd8bP8zKKRk9bI4d_i7kHfFKiM7-Un

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get Cloudflare Account ID
        id: cf-account
        run: |
          ACCOUNT_ID=$(curl -sf \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts" \
            | jq -r '.result[0].id')
          echo "account_id=$ACCOUNT_ID" >> "$GITHUB_OUTPUT"
          echo "Account ID: $ACCOUNT_ID"

      - name: Check / create Cloudflare Pages project
        run: |
          ACCOUNT_ID="${{ steps.cf-account.outputs.account_id }}"
          PROJECT_NAME="ohatui-db"

          STATUS=$(curl -sf \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/$ACCOUNT_ID/pages/projects/$PROJECT_NAME" \
            | jq -r '.success')

          if [ "$STATUS" = "true" ]; then
            echo "Pages project '$PROJECT_NAME' already exists."
          else
            echo "Creating Pages project '$PROJECT_NAME' ..."
            curl -sf -X POST \
              -H "Authorization: Bearer $CF_API_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"name\":\"$PROJECT_NAME\",\"production_branch\":\"main\"}" \
              "https://api.cloudflare.com/client/v4/accounts/$ACCOUNT_ID/pages/projects"
            echo "Project created."
          fi

      - name: Smoke test - FixTweet API
        run: node ohatsui/test/smoke-fxtwitter.js

      - name: Setup D1 database and bindings
        run: |
          ACCOUNT_ID="${{ steps.cf-account.outputs.account_id }}"

          # D1 データベースが存在しなければ作成
          DB_LIST=$(curl -s \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/$ACCOUNT_ID/d1/database?per_page=100")
          echo "DB_LIST success: $(echo "$DB_LIST" | jq -r '.success')"
          DB_ID=$(echo "$DB_LIST" | jq -r '.result[] | select(.name == "ohatui-tweets") | .uuid // empty' | head -1)

          if [ -z "$DB_ID" ]; then
            echo "D1 database 'ohatui-tweets' を作成..."
            CREATE_RESP=$(curl -s -X POST \
              -H "Authorization: Bearer $CF_API_TOKEN" \
              -H "Content-Type: application/json" \
              -d '{"name":"ohatui-tweets"}' \
              "https://api.cloudflare.com/client/v4/accounts/$ACCOUNT_ID/d1/database")
            echo "CREATE response: $(echo "$CREATE_RESP" | jq '{success, errors}')"
            DB_ID=$(echo "$CREATE_RESP" | jq -r '.result.uuid // empty')
            echo "作成完了: $DB_ID"
          else
            echo "D1 database 'ohatui-tweets' は既に存在: $DB_ID"
          fi

          if [ -z "$DB_ID" ]; then
            echo "ERROR: DB_ID を取得できませんでした。D1 API レスポンスを確認してください。"
            exit 1
          fi

          # スキーマ適用
          SCHEMA_RESP=$(curl -s -X POST \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"sql\":\"CREATE TABLE IF NOT EXISTS tweets (id TEXT PRIMARY KEY, tweet_id TEXT UNIQUE NOT NULL, text TEXT NOT NULL, created_at TEXT NOT NULL, image_url TEXT, like_count INTEGER NOT NULL DEFAULT 0, retweet_count INTEGER NOT NULL DEFAULT 0, type TEXT NOT NULL DEFAULT 'ohachoco' CHECK(type IN ('ohachoco','konchoco','konbanchoco'))); CREATE INDEX IF NOT EXISTS idx_created_at ON tweets(created_at); CREATE INDEX IF NOT EXISTS idx_type ON tweets(type);\"}" \
            "https://api.cloudflare.com/client/v4/accounts/$ACCOUNT_ID/d1/database/$DB_ID/query")
          echo "スキーマ適用: $(echo "$SCHEMA_RESP" | jq '{success, errors}')"

          # Pages プロジェクトに D1 バインディングを設定
          PATCH_BODY="{\"deployment_configs\":{\"production\":{\"d1_databases\":{\"DB\":{\"id\":\"$DB_ID\"}}},\"preview\":{\"d1_databases\":{\"DB\":{\"id\":\"$DB_ID\"}}}}}"

          # COLLECT_SECRET が設定されていれば環境変数にも追加
          if [ -n "${{ secrets.COLLECT_SECRET }}" ]; then
            PATCH_BODY="{\"deployment_configs\":{\"production\":{\"d1_databases\":{\"DB\":{\"id\":\"$DB_ID\"}},\"env_vars\":{\"COLLECT_SECRET\":{\"value\":\"${{ secrets.COLLECT_SECRET }}\",\"type\":\"secret_text\"}}},\"preview\":{\"d1_databases\":{\"DB\":{\"id\":\"$DB_ID\"}},\"env_vars\":{\"COLLECT_SECRET\":{\"value\":\"${{ secrets.COLLECT_SECRET }}\",\"type\":\"secret_text\"}}}}}"
            echo "COLLECT_SECRET を Pages 環境変数に設定します"
          else
            echo "COLLECT_SECRET が未設定です (GitHub Secret 'COLLECT_SECRET' を追加してください)"
          fi

          PATCH_RESP=$(curl -s -X PATCH \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$PATCH_BODY" \
            "https://api.cloudflare.com/client/v4/accounts/$ACCOUNT_ID/pages/projects/ohatui-db")
          echo "D1 バインディング設定: $(echo "$PATCH_RESP" | jq '{success, errors}')"

          echo "D1_DATABASE_ID=$DB_ID" >> "$GITHUB_ENV"

          # wrangler.toml に D1 バインディングを追加（wrangler pages deploy で反映される）
          printf '\n[[d1_databases]]\nbinding = "DB"\ndatabase_name = "ohatui-tweets"\ndatabase_id = "%s"\n' "$DB_ID" >> ohatsui/wrangler.toml
          echo "wrangler.toml に D1 バインディング追加完了 (database_id=$DB_ID)"

      - name: Deploy ohatsui/ to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ env.CF_API_TOKEN }}
          accountId: ${{ steps.cf-account.outputs.account_id }}
          wranglerVersion: "3.99.0"
          workingDirectory: ohatsui
          command: pages deploy . --project-name=ohatui-db --commit-dirty=true

      - name: Post-deploy validation - fetch-tweet API
        continue-on-error: true
        shell: bash
        run: |
          set +e  # errexit を無効化（明示的にエラーチェック）
          ACCOUNT_ID="${{ steps.cf-account.outputs.account_id }}"
          PROJECT_NAME="ohatui-db"
          TEST_TWEET_URL="https://x.com/i/status/2033342224906489994"
          ENCODED_URL="https%3A%2F%2Fx.com%2Fi%2Fstatus%2F2033342224906489994"

          # デプロイ直後は少し待つ（エッジへの伝播）
          echo "=== 15秒待機（エッジ伝播）==="
          sleep 15

          # 最新デプロイメントの URL を取得
          echo "=== Cloudflare API からデプロイ URL を取得 ==="
          CF_DEPLOY_RESP=$(curl -sf \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/$ACCOUNT_ID/pages/projects/$PROJECT_NAME/deployments?per_page=1")
          CF_STATUS=$?
          echo "CF API 応答コード: $CF_STATUS"
          DEPLOY_URL=$(echo "$CF_DEPLOY_RESP" | jq -r '.result[0].url // empty' 2>/dev/null)
          echo "デプロイ URL: '$DEPLOY_URL'"

          if [ -z "$DEPLOY_URL" ]; then
            SUBDOMAIN=$(curl -sf \
              -H "Authorization: Bearer $CF_API_TOKEN" \
              "https://api.cloudflare.com/client/v4/accounts/$ACCOUNT_ID/pages/projects/$PROJECT_NAME" \
              | jq -r '.result.subdomain' 2>/dev/null)
            DEPLOY_URL="https://$SUBDOMAIN"
            echo "フォールバック URL: $DEPLOY_URL"
          fi

          API_URL="$DEPLOY_URL/api/fetch-tweet?url=$ENCODED_URL"
          echo ""
          echo "=== エンドポイント検証 ==="
          echo "API URL: $API_URL"

          # HTTP ステータスコードとボディを分けて取得
          HTTP_CODE=$(curl -s -o /tmp/fetch_response.txt -w "%{http_code}" "$API_URL")
          CURL_EXIT=$?
          echo "curl 終了コード: $CURL_EXIT"
          echo "HTTP ステータス: $HTTP_CODE"

          RESPONSE=$(cat /tmp/fetch_response.txt)
          echo "--- レスポンス全体 ---"
          echo "$RESPONSE" | head -c 2000
          echo ""
          echo "--- end ---"

          # JSON 検証
          if ! echo "$RESPONSE" | jq . >/dev/null 2>&1; then
            echo "FAIL: レスポンスが JSON ではありません (HTTP $HTTP_CODE)"
            exit 1
          fi

          # 各フィールドを取得
          TEXT=$(echo "$RESPONSE" | jq -r '.text // ""')
          LIKE_COUNT_RAW=$(echo "$RESPONSE" | jq '.like_count')
          RT_COUNT_RAW=$(echo "$RESPONSE" | jq '.retweet_count')
          CREATED_AT=$(echo "$RESPONSE" | jq -r '.created_at // ""')

          echo ""
          echo "=== フィールド検証結果 ==="
          echo "  text         : ${TEXT:0:80}"
          echo "  like_count   : $LIKE_COUNT_RAW"
          echo "  retweet_count: $RT_COUNT_RAW"
          echo "  created_at   : $CREATED_AT"

          ERRORS=0
          if [ -z "$TEXT" ]; then
            echo "FAIL: text が空"
            ERRORS=$((ERRORS+1))
          fi
          if [ "$LIKE_COUNT_RAW" = "null" ] || [ -z "$LIKE_COUNT_RAW" ]; then
            echo "FAIL: like_count が null/欠落"
            ERRORS=$((ERRORS+1))
          fi
          if [ "$RT_COUNT_RAW" = "null" ] || [ -z "$RT_COUNT_RAW" ]; then
            echo "FAIL: retweet_count が null/欠落"
            ERRORS=$((ERRORS+1))
          fi
          if [ -z "$CREATED_AT" ]; then
            echo "FAIL: created_at が空/欠落"
            ERRORS=$((ERRORS+1))
          fi

          # Step Summary に結果を書き出し（成否に関わらず）
          {
            if [ "$ERRORS" -gt 0 ]; then
              echo "## ⚠️ Post-deploy validation FAILED ($ERRORS errors)"
            else
              echo "## ✅ Post-deploy validation OK"
            fi
            echo ""
            echo "### API URL"
            echo '```'
            echo "$API_URL"
            echo '```'
            echo ""
            echo "### HTTP Status: $HTTP_CODE"
            echo ""
            echo "### Response body"
            echo '```json'
            echo "$RESPONSE" | head -c 3000
            echo '```'
            echo ""
            echo "### Field check"
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| text | ${TEXT:0:80} |"
            echo "| like_count | $LIKE_COUNT_RAW |"
            echo "| retweet_count | $RT_COUNT_RAW |"
            echo "| created_at | $CREATED_AT |"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$ERRORS" -gt 0 ]; then
            echo ""
            echo "FAIL: $ERRORS 件の検証エラー"
            exit 1
          fi

          echo ""
          echo "OK: /api/fetch-tweet 全フィールド確認完了"
          echo "DEPLOY_URL=$DEPLOY_URL" >> "$GITHUB_ENV"

      - name: Show deployed URL and IFTTT setup
        if: always()
        run: |
          ACCOUNT_ID="${{ steps.cf-account.outputs.account_id }}"
          PROJECT_NAME="ohatui-db"

          # 最新デプロイメントの URL を取得（post-deploy validation で設定済みなら再利用）
          DEPLOY_URL="${DEPLOY_URL:-}"
          if [ -z "$DEPLOY_URL" ]; then
            DEPLOY_RESP=$(curl -sf \
              -H "Authorization: Bearer $CF_API_TOKEN" \
              "https://api.cloudflare.com/client/v4/accounts/$ACCOUNT_ID/pages/projects/$PROJECT_NAME/deployments?per_page=1")
            DEPLOY_URL=$(echo "$DEPLOY_RESP" | jq -r '.result[0].url // empty')
          fi
          SUBDOMAIN=$(curl -sf \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/$ACCOUNT_ID/pages/projects/$PROJECT_NAME" \
            | jq -r '.result.subdomain')

          echo ""
          echo "=========================================="
          echo "  デプロイ完了!"
          echo ""
          if [ -n "$DEPLOY_URL" ]; then
          echo "  ★ プレビュー URL (今回のデプロイ):"
          echo "    $DEPLOY_URL"
          echo ""
          fi
          echo "  本番 URL: https://$SUBDOMAIN"
          echo "=========================================="
          echo ""

          # GitHub Step Summary にも表示
          {
            echo "## ✅ デプロイ完了"
            if [ -n "$DEPLOY_URL" ]; then
              echo "- **プレビュー URL**: $DEPLOY_URL"
            fi
            echo "- **本番 URL**: https://$SUBDOMAIN"
          } >> "$GITHUB_STEP_SUMMARY"

          echo "─── IFTTT 設定 (毎日のおはつい自動収集) ───"
          echo "1. https://ifttt.com でアプレット作成 (無料)"
          echo "   If:   X (Twitter) > 'New tweet by you'"
          echo "   Then: Webhooks > 'Make a web request'"
          echo "         URL:    https://$SUBDOMAIN/api/collect?token=<COLLECT_SECRET の値>"
          echo "         Method: POST"
          echo "         Type:   application/json"
          echo '         Body:   {"text":"{{Text}}","tweet_url":"{{LinkToTweet}}","created_at":"{{CreatedAt}}"}'
          echo ""
          echo "2. GitHub Secret 'COLLECT_SECRET' に任意のトークン文字列を設定"
          echo "   (設定後、このワークフローを再実行して Cloudflare Pages に反映)"
          echo ""
          echo "─── X アーカイブからの一括インポート ───"
          echo "  node ohatsui/collector/import-archive.js /path/to/data/tweets.js"
          echo "  (CF_API_TOKEN / CF_ACCOUNT_ID / CF_D1_DATABASE_ID を環境変数に設定して実行)"
