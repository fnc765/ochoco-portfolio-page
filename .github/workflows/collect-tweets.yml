name: おはつい収集 (X API → D1)

on:
  schedule:
    # 毎日 02:00 JST (= 17:00 UTC) に実行
    - cron: '0 17 * * *'
  workflow_dispatch:  # 手動実行も可能

env:
  CF_API_TOKEN: WctE7mePBsrd8bP8zKKRk9bI4d_i7kHfFKiM7-Un

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Get Cloudflare Account ID
        id: cf-account
        run: |
          ACCOUNT_ID=$(curl -sf \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts" \
            | jq -r '.result[0].id')
          echo "account_id=$ACCOUNT_ID" >> "$GITHUB_OUTPUT"

      - name: Get D1 Database ID
        id: d1
        run: |
          ACCOUNT_ID="${{ steps.cf-account.outputs.account_id }}"
          DB_ID=$(curl -sf \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/$ACCOUNT_ID/d1/database?per_page=100" \
            | jq -r '.result[] | select(.name == "ohatui-tweets") | .uuid')
          if [ -z "$DB_ID" ]; then
            echo "D1 database 'ohatui-tweets' が見つかりません。デプロイワークフローを先に実行してください。"
            exit 1
          fi
          echo "database_id=$DB_ID" >> "$GITHUB_OUTPUT"
          echo "D1 database_id: $DB_ID"

      - name: Collect tweets from X API
        env:
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          CF_ACCOUNT_ID: ${{ steps.cf-account.outputs.account_id }}
          CF_D1_DATABASE_ID: ${{ steps.d1.outputs.database_id }}
        run: node ohatsui/collector/collect.js
