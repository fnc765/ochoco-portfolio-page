name: おはつい手動インポート (X アーカイブ → D1)

# このワークフローは X アーカイブデータを手動で D1 にインポートするためのものです。
# 日常的な収集は IFTTT Webhook (POST /api/collect) が自動で行います。
#
# ─────────────────────────────────────────
# ローカルで実行する場合 (推奨)
# ─────────────────────────────────────────
#   CF_API_TOKEN=xxx CF_ACCOUNT_ID=xxx CF_D1_DATABASE_ID=xxx \
#     node ohatsui/collector/import-archive.js /path/to/data/tweets.js
# ─────────────────────────────────────────

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'ドライラン (実際には保存しない)'
        type: boolean
        default: true

env:
  CF_API_TOKEN: WctE7mePBsrd8bP8zKKRk9bI4d_i7kHfFKiM7-Un

jobs:
  info:
    runs-on: ubuntu-latest
    steps:
      - name: インポート方法を表示
        run: |
          echo "=============================================="
          echo "X アーカイブからのインポートはローカルで実行してください"
          echo "=============================================="
          echo ""
          echo "1. X のデータアーカイブをダウンロード"
          echo "   設定 > その他 > アカウント > データのアーカイブをリクエスト"
          echo ""
          echo "2. 必要な環境変数を取得"

          ACCOUNT_ID=$(curl -sf \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts" \
            | jq -r '.result[0].id')

          DB_ID=$(curl -sf \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/$ACCOUNT_ID/d1/database?per_page=100" \
            | jq -r '.result[] | select(.name == "ohatui-tweets") | .uuid')

          echo ""
          echo "  CF_API_TOKEN=WctE7mePBsrd8bP8zKKRk9bI4d_i7kHfFKiM7-Un"
          echo "  CF_ACCOUNT_ID=$ACCOUNT_ID"
          echo "  CF_D1_DATABASE_ID=$DB_ID"
          echo ""
          echo "3. ローカルで実行"
          echo "   CF_API_TOKEN=... CF_ACCOUNT_ID=... CF_D1_DATABASE_ID=... \\"
          echo "     node ohatsui/collector/import-archive.js /path/to/data/tweets.js"
          echo ""
          echo "注意: dry_run=true の場合もローカルでの実行が必要です"
