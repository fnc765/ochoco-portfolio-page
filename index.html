<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">

    <!-- tsParticles (Phase 2) -->
    <script src="https://cdn.jsdelivr.net/npm/tsparticles@2.12.0/tsparticles.bundle.min.js"></script>
</head>
<body>
    <!-- Particles Container (for Phase 2) -->
    <div id="particles-js"></div>

    <!-- Loading Screen -->
    <div id="loader">
        <div class="spinner"></div>
        <p class="loading-text">Loading...</p>
    </div>

    <!-- Main Content -->
    <main id="content">
        <div class="container">
            <!-- Profile Section -->
            <header class="profile-section">
                <img src="images/profile.png" alt="Profile Picture" class="profile-img">
                <h1 class="profile-name">おちょこ</h1>
            </header>

            <!-- Social Links -->
            <nav class="social-links">
                <a href="https://vrchat.com/home/user/" class="social-link" target="_blank" rel="noopener noreferrer">
                    <i class="fas fa-vr-cardboard"></i>
                    <span>VRChat</span>
                </a>
                <a href="https://note.com/" class="social-link" target="_blank" rel="noopener noreferrer">
                    <i class="fas fa-pen-nib"></i>
                    <span>Note</span>
                </a>
                <a href="https://youtube.com/" class="social-link" target="_blank" rel="noopener noreferrer">
                    <i class="fab fa-youtube"></i>
                    <span>YouTube</span>
                </a>
                <a href="https://twitter.com/" class="social-link" target="_blank" rel="noopener noreferrer">
                    <i class="fab fa-x-twitter"></i>
                    <span>X (Twitter)</span>
                </a>
            </nav>

            <!-- Footer -->
            <footer class="footer">
                <p>&copy; 2025 ochoco. All rights reserved.</p>
            </footer>
        </div>
    </main>

    <!-- JavaScript -->
    <script src="js/main.js"></script>
</body>
</html>
