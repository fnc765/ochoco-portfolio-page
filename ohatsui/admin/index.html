<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>おはついアーカイブ — 手動登録</title>
  <style>
    body { font-family: sans-serif; max-width: 540px; margin: 40px auto; padding: 0 16px; background: #fafafa; color: #222; }
    h1 { font-size: 1.2rem; margin-bottom: 24px; }
    label { display: block; font-size: .85rem; color: #555; margin-bottom: 4px; }
    input, textarea { width: 100%; box-sizing: border-box; padding: 8px 10px; border: 1px solid #ccc; border-radius: 6px; font-size: .95rem; margin-bottom: 14px; }
    textarea { height: 80px; resize: vertical; }
    .row { display: flex; gap: 8px; margin-bottom: 14px; }
    .row input { margin-bottom: 0; flex: 1; }
    button { background: #1da1f2; color: #fff; border: none; border-radius: 6px; padding: 10px 24px; font-size: 1rem; cursor: pointer; }
    button:hover { background: #0d8bd9; }
    button:disabled { background: #aaa; cursor: default; }
    button.secondary { background: #555; font-size: .9rem; padding: 10px 16px; }
    button.secondary:hover { background: #333; }
    #result { margin-top: 20px; padding: 12px; border-radius: 6px; font-size: .9rem; white-space: pre-wrap; display: none; }
    .ok  { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    .err { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    .info { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
    #preview-img { display: none; max-width: 100%; border-radius: 8px; margin-bottom: 14px; }
  </style>
</head>
<body>
  <h1>おはついアーカイブ — 手動登録</h1>

  <label>COLLECT_SECRET トークン</label>
  <input type="password" id="token" placeholder="Cloudflare 環境変数の COLLECT_SECRET">

  <label>ツイート URL <span style="color:#888">（例: https://x.com/ochoco0215/status/123456789）</span></label>
  <div class="row">
    <input type="url" id="tweet_url" placeholder="https://x.com/ochoco0215/status/...">
    <button class="secondary" onclick="autoFetch()" id="fetch-btn">URL から取得</button>
  </div>

  <label>ツイート本文</label>
  <textarea id="text" placeholder="おはちょこ～🍫！今日も..."></textarea>

  <img id="preview-img" alt="ツイート画像プレビュー">
  <input type="hidden" id="image_url">

  <label>投稿日時 <span style="color:#888">（省略すると現在時刻）</span></label>
  <input type="datetime-local" id="created_at">

  <button onclick="submit()">登録する</button>

  <div id="result"></div>

  <script>
    async function autoFetch() {
      const tweetUrl = document.getElementById('tweet_url').value.trim();
      if (!tweetUrl) {
        showResult('ツイート URL を入力してください', false);
        return;
      }

      const btn = document.getElementById('fetch-btn');
      btn.disabled = true;
      btn.textContent = '取得中…';
      showResult('Twitter API からデータを取得中…', null);

      try {
        const res  = await fetch(`/api/fetch-tweet?url=${encodeURIComponent(tweetUrl)}`);
        const data = await res.json().catch(() => ({}));

        if (!res.ok) {
          showResult(`取得エラー (HTTP ${res.status}): ${data.error ?? JSON.stringify(data)}`, false);
          return;
        }

        if (data.error) {
          showResult(`取得エラー: ${data.error}`, false);
          return;
        }

        // フォームに反映
        document.getElementById('text').value = data.text ?? '';

        if (data.created_at) {
          // datetime-local は "YYYY-MM-DDTHH:MM" 形式
          const dt = new Date(data.created_at);
          if (!isNaN(dt.getTime())) {
            const local = new Date(dt.getTime() - dt.getTimezoneOffset() * 60000)
              .toISOString().slice(0, 16);
            document.getElementById('created_at').value = local;
          }
        }

        if (data.image_url) {
          document.getElementById('image_url').value = data.image_url;
          const img = document.getElementById('preview-img');
          img.src = data.image_url;
          img.style.display = 'block';
        } else {
          document.getElementById('image_url').value = '';
          document.getElementById('preview-img').style.display = 'none';
        }

        const likeCount = data.like_count ?? 'N/A';
        const rtCount   = data.retweet_count ?? 'N/A';
        const createdAt = data.created_at ?? 'N/A';
        showResult(
          `取得成功！\n` +
          `いいね: ${likeCount}  RT: ${rtCount}\n` +
          `投稿日時: ${createdAt}`,
          true
        );
      } catch (e) {
        showResult(`通信エラー: ${e.message}`, false);
      } finally {
        btn.disabled = false;
        btn.textContent = 'URL から取得';
      }
    }

    async function submit() {
      const token    = document.getElementById('token').value.trim();
      const tweetUrl = document.getElementById('tweet_url').value.trim();
      const text     = document.getElementById('text').value.trim();
      const dtVal    = document.getElementById('created_at').value;
      const imageUrl = document.getElementById('image_url').value.trim();

      if (!tweetUrl) {
        showResult('ツイート URL は必須です', false);
        return;
      }

      const body = { tweet_url: tweetUrl };
      if (text)     body.text      = text;
      if (dtVal)    body.created_at = new Date(dtVal).toISOString();
      if (imageUrl) body.image_url  = imageUrl;

      const params = token ? `?token=${encodeURIComponent(token)}` : '';
      try {
        const res  = await fetch(`/api/collect${params}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        const data = await res.json().catch(() => ({}));
        showResult(
          `HTTP ${res.status}\n${JSON.stringify(data, null, 2)}`,
          res.ok && !data.error
        );
      } catch (e) {
        showResult(`通信エラー: ${e.message}`, false);
      }
    }

    function showResult(msg, ok) {
      const el = document.getElementById('result');
      el.textContent = msg;
      el.className = ok === true ? 'ok' : ok === false ? 'err' : 'info';
      el.style.display = 'block';
    }
  </script>
</body>
</html>
