    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        /* ===================================
           リセット & 基本スタイル
           =================================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html, canvas {
            width: 100%;
            height: 100%;
            position: relative;
            margin: 0;
            padding: 0;
            background: #111;
        }

        body {
            font-family: 'M PLUS Rounded 1c', 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
            font-weight: 700;
            color: #fff;
            overflow-x: hidden;
        }

        /* 背景画像 + ブラー */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('images/background.png') center/cover no-repeat;
            filter: blur(3px);
            z-index: -2;
            /* 画像がない場合のフォールバック */
            background-color: #1a1a1a;
        }

        /* ラジアルグラデーションオーバーレイ */
        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(
                ellipse at 50% 40%,
                transparent 60%,
                rgba(255, 255, 255, 0.13)
            );
            z-index: -1;
        }

        /* ===================================
           Canvas背景
           =================================== */
        #bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        /* ===================================
           ローディング画面
           =================================== */
        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(17, 17, 17, 0.7);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.2);
            border-top: 4px solid #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .loading-text {
            margin-top: 20px;
            font-size: 1.2rem;
            animation: blink 1.5s steps(2, start) infinite;
        }

        /* ===================================
           メインコンテンツ
           =================================== */
        #content {
            display: none;
            position: relative;
            z-index: 1;
        }

        .container {
            min-height: 100vh;
            max-width: 1400px;
            margin: 0 auto;
            padding: 3rem 2rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 2rem;
        }

        /* ===================================
           プロフィールセクション
           =================================== */
        .profile-section {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
        }

        .profile-img {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.2);
            object-fit: cover;
            background-color: #222;
            transition: transform 0.3s ease;
        }

        .profile-img:hover {
            transform: scale(1.05);
        }

        .profile-name {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: 0.05em;
        }

        /* ===================================
           ソーシャルリンク
           =================================== */
        .social-links {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            width: 100%;
            max-width: 400px;
        }

        .social-link {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem 1.5rem;
            background-color: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 0.5rem;
            color: #fff;
            text-decoration: none;
            font-size: 1.1rem;
            transition: all 0.3s ease;
        }

        .social-link:hover {
            background-color: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(255, 255, 255, 0.1);
        }

        .social-link:focus {
            outline: 2px solid rgba(255, 255, 255, 0.8);
            outline-offset: 2px;
        }

        .social-link i {
            font-size: 1.5rem;
            width: 30px;
            text-align: center;
        }

        /* ===================================
           フッター
           =================================== */
        .footer {
            margin-top: 2rem;
            text-align: center;
            font-size: 0.9rem;
            opacity: 0.7;
        }

        /* ===================================
           アニメーション
           =================================== */
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes blink {
            0%, 50% {
                opacity: 1;
            }
            25%, 75% {
                opacity: 0.2;
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        #content.show {
            animation: fadeIn 0.7s ease;
        }

        /* ===================================
           レスポンシブデザイン
           =================================== */
        @media (max-width: 768px) {
            .container {
                padding: 2rem 1.5rem;
            }

            .profile-name {
                font-size: 1.8rem;
            }

            .social-links {
                max-width: 350px;
            }

            .social-link {
                padding: 0.9rem 1.2rem;
                font-size: 1rem;
            }

            .social-link i {
                font-size: 1.3rem;
            }
        }

        @media (max-width: 600px) {
            .container {
                padding: 2rem 1rem;
                min-height: 0;
            }

            .profile-img {
                width: 120px;
                height: 120px;
            }

            .profile-name {
                font-size: 1.5rem;
            }

            .social-links {
                max-width: 100%;
                gap: 0.8rem;
            }

            .social-link {
                padding: 0.8rem 1rem;
                font-size: 0.95rem;
            }

            .social-link i {
                font-size: 1.2rem;
                width: 25px;
            }

            .footer {
                font-size: 0.8rem;
                margin-top: 1.5rem;
            }
        }

        @media (max-width: 400px) {
            .profile-img {
                width: 100px;
                height: 100px;
            }

            .profile-name {
                font-size: 1.3rem;
            }

            .social-link {
                padding: 0.7rem 0.8rem;
                font-size: 0.9rem;
                gap: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <!-- Canvas Background -->
    <canvas id="bg"></canvas>

    <!-- Loading Screen -->
    <div id="loader" role="status" aria-live="polite" aria-label="ページを読み込んでいます">
        <div class="spinner" aria-hidden="true"></div>
        <p class="loading-text">Loading...</p>
    </div>

    <!-- Main Content -->
    <main id="content">
        <div class="container">
            <!-- Profile Section -->
            <header class="profile-section">
                <img src="images/profile.png" alt="おちょこのプロフィール画像" class="profile-img">
                <h1 class="profile-name">おちょこ</h1>
            </header>

            <!-- Social Links -->
            <nav class="social-links" aria-label="ソーシャルメディアリンク">
                <a href="https://vrchat.com/home/user/" class="social-link" target="_blank" rel="noopener noreferrer" aria-label="VRChatプロフィールを開く（新しいタブ）">
                    <i class="fas fa-vr-cardboard" aria-hidden="true"></i>
                    <span>VRChat</span>
                </a>
                <a href="https://note.com/" class="social-link" target="_blank" rel="noopener noreferrer" aria-label="Noteを開く（新しいタブ）">
                    <i class="fas fa-pen-nib" aria-hidden="true"></i>
                    <span>Note</span>
                </a>
                <a href="https://youtube.com/" class="social-link" target="_blank" rel="noopener noreferrer" aria-label="YouTubeチャンネルを開く（新しいタブ）">
                    <i class="fab fa-youtube" aria-hidden="true"></i>
                    <span>YouTube</span>
                </a>
                <a href="https://twitter.com/" class="social-link" target="_blank" rel="noopener noreferrer" aria-label="X (Twitter)を開く（新しいタブ）">
                    <i class="fab fa-x-twitter" aria-hidden="true"></i>
                    <span>X (Twitter)</span>
                </a>
            </nav>

            <!-- Footer -->
            <footer class="footer">
                <p>&copy; 2025 ochoco. All rights reserved.</p>
            </footer>
        </div>
    </main>

    <!-- Particle Animation Script -->
    <script>
        "use strict";

        // background animation
        (function() {

            var Base, Particle, canvas, colors, context, draw, drawables, i, mouseX, mouseY, mouseVX, mouseVY, rand, update, click, min, max, colors, particles;

            min = 1;
            max = 8;
            particles = 200;
            colors = ["64, 32, 0", "250, 64, 0", "64, 0, 0", "200, 200, 200"];

            rand = function(a, b) {
                return Math.random() * (b - a) + a;
            };

            Particle = (function() {
                function Particle() {
                    this.reset();
                }

                Particle.prototype.reset = function() {
                    this.color = colors[~~(Math.random()*colors.length)];
                    this.radius = rand(min, max);
                    this.x = rand(0, canvas.width);
                    this.y = rand(-20, canvas.height*0.5);
                    this.vx = -5 + Math.random()*10;
                    this.vy = 0.7 * this.radius;
                    this.valpha = rand(0.02, 0.09);
                    this.opacity = 0;
                    this.life = 0;
                    this.onupdate = undefined;
                    this.type = "dust";
                };

                Particle.prototype.update = function() {
                    this.x = (this.x + this.vx/3);
                    this.y = (this.y + this.vy/3);

                    if(this.opacity >=1 && this.valpha > 0) this.valpha *=-1;
                    this.opacity += this.valpha/3;
                    this.life += this.valpha/3;

                    if(this.type === "dust")
                        this.opacity = Math.min(1, Math.max(0, this.opacity));
                    else
                        this.opacity = 1;

                    if(this.onupdate) this.onupdate();
                    if(this.life < 0 || this.radius <= 0 || this.y > canvas.height){
                        this.onupdate = undefined;
                        this.reset();
                    }
                };

                Particle.prototype.draw = function(c) {
                    c.strokeStyle = "rgba(" + this.color + ", " + Math.min(this.opacity, 0.85) + ")";
                    c.fillStyle = "rgba(" + this.color + ", " + Math.min(this.opacity, 0.65) + ")";
                    c.beginPath();
                    c.arc(this.x, this.y, this.radius, 2 * Math.PI, false);
                    c.fill();
                    c.stroke();
                };

                return Particle;

            })();

            mouseVX = mouseVY = mouseX = mouseY = 0;

            canvas = document.getElementById("bg");
            context = canvas.getContext("2d");
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            drawables = (function() {
                var _i, _results;
                _results = [];
                for (i = _i = 1; _i <= particles; i = ++_i) {
                    _results.push(new Particle);
                }
                return _results;
            })();

            draw = function() {
                var d, _i, _len;
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                context.clearRect(0, 0, canvas.width, canvas.height)

                for (_i = 0, _len = drawables.length; _i < _len; _i++) {
                    d = drawables[_i];
                    d.draw(context);
                }
            };

            update = function() {
                var d, _i, _len, _results;
                _results = [];
                for (_i = 0, _len = drawables.length; _i < _len; _i++) {
                    d = drawables[_i];
                    _results.push(d.update());
                }
                return _results;
            };

            document.onmousemove = function(e) {
                mouseVX = mouseX;
                mouseVY = mouseY;
                mouseX = ~~e.pageX;
                mouseY = ~~e.pageY;
                mouseVX = ~~((mouseVX - mouseX)/2);
                mouseVY = ~~((mouseVY - mouseY)/2);

            };

            window.addEventListener('resize', draw, false);
            setInterval(draw, 1000 / 30);
            setInterval(update, 1000 / 60);
        }).call(this);

        // ページ読み込み完了時の処理
        window.addEventListener('load', () => {
            const loader = document.getElementById('loader');
            const content = document.getElementById('content');

            // 1秒間ローディング画面を表示
            setTimeout(() => {
                // ローダーをフェードアウト
                loader.style.opacity = '0';

                // フェードアウト完了後にローダーを非表示にしてコンテンツを表示
                setTimeout(() => {
                    loader.style.display = 'none';
                    content.style.display = 'block';
                    content.classList.add('show');
                }, 500);
            }, 1000);
        });

        // 画像読み込みエラー時の処理
        document.addEventListener('DOMContentLoaded', () => {
            const profileImg = document.querySelector('.profile-img');

            if (profileImg) {
                profileImg.addEventListener('error', () => {
                    // 画像が見つからない場合、代替の背景色を表示
                    profileImg.style.backgroundColor = '#333';
                    profileImg.alt = 'プロフィール画像が見つかりません';
                });
            }
        });

        // Escキーでローディング画面をスキップ
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                const loader = document.getElementById('loader');
                if (loader && loader.style.display !== 'none') {
                    loader.style.display = 'none';
                    const content = document.getElementById('content');
                    if (content) {
                        content.style.display = 'block';
                        content.classList.add('show');
                    }
                }
            }
        });
    </script>
</body>
