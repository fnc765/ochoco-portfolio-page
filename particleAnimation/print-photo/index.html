<!DOCTYPE html>
<html lang="ja" prefix="og: https://ogp.me/ns#">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PrintPhoto - おちょこ</title>

    <!-- SEO Meta Tags -->
    <meta name="description" content="VRChatアバターを現実世界と合成してフレーム付き写真を作ろう">
    <meta name="keywords" content="おちょこ, ochoco, PrintPhoto, VRChat, グリーンバック, 合成カメラ">
    <meta name="author" content="おちょこ">

    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="PrintPhoto - おちょこ">
    <meta property="og:description" content="VRChatアバターを現実世界と合成してフレーム付き写真を作ろう">
    <meta property="og:image" content="https://fnchoco.com/images/profile.png">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:title" content="PrintPhoto - おちょこ">
    <meta property="twitter:description" content="VRChatアバターを現実世界と合成してフレーム付き写真を作ろう">

    <!-- Theme Color -->
    <meta name="theme-color" content="#141414">

    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,&lt;svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22&gt;&lt;text y=%22.9em%22 font-size=%2290%22&gt;🍫&lt;/text&gt;&lt;/svg&gt;">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400&family=Noto+Sans+JP:wght@400&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css?v=5">
</head>
<body>
    <!-- =====================================
         ローディング画面
         ===================================== -->
    <div id="loader" role="status" aria-live="polite" aria-label="ページを読み込んでいます">
        <div class="spinner" aria-hidden="true"></div>
        <p class="loading-text">Loading...</p>
    </div>

    <!-- =====================================
         メインコンテンツ
         ===================================== -->
    <main id="content" style="display:none;" data-testid="main-view">
        <!-- デバッグログコピー用の不可視ボタン (画面右上に固定、視覚的には完全に見えない) -->
        <button type="button" id="btn-copy-debug" class="debug-copy-hidden" aria-label="デバッグログをコピー" data-testid="copy-debug-btn"></button>
        <!-- ヘッダー -->
        <header class="page-header">
            <a href="../" class="back-link" aria-label="ポートフォリオに戻る">
                <i class="fas fa-arrow-left" aria-hidden="true"></i>
                <span>Portfolio</span>
            </a>
            <h1 class="page-title">PrintPhoto</h1>
            <p class="page-subtitle">VRChatアバターを現実世界と合成しよう</p>
        </header>

        <!-- =================================
             ツールバー: 画像を選択 / 履歴から選択
             ================================= -->
        <div class="pp-toolbar glass-card">
            <label class="pp-toolbar-btn primary-btn" for="image-input" data-testid="image-input-label">
                <i class="fas fa-image" aria-hidden="true"></i>
                <span>画像を選択</span>
            </label>
            <input type="file" id="image-input" accept="image/*" class="hidden-input" data-testid="image-input">
            <button type="button" id="open-history-btn" class="secondary-btn" data-testid="open-history-btn">
                <i class="fas fa-history" aria-hidden="true"></i>
                <span>履歴から選択</span>
            </button>
        </div>

        <!-- HTTPS警告 -->
        <div class="glass-card warning-card" id="https-warning" style="display:none;">
            <p><i class="fas fa-lock" aria-hidden="true"></i> カメラを使うにはHTTPS接続が必要です</p>
        </div>

        <!-- カメラ権限ガイダンス -->
        <div class="glass-card warning-card" id="camera-permission-guide" style="display:none;">
            <p><i class="fas fa-info-circle" aria-hidden="true"></i> <span id="camera-permission-text"></span></p>
        </div>

        <!-- 履歴モーダル -->
        <div id="history-modal" class="modal" style="display:none;" data-testid="history-modal" role="dialog" aria-modal="true" aria-label="履歴から選択">
            <div class="modal-overlay"></div>
            <div class="modal-content">
                <h3 class="modal-title">
                    <i class="fas fa-history" aria-hidden="true"></i>
                    履歴から選択
                </h3>
                <div class="thumbnail-grid" id="thumbnail-grid">
                    <p class="empty-text" data-testid="thumbnail-empty">まだ履歴がありません</p>
                </div>
                <div class="modal-actions">
                    <button class="secondary-btn" id="btn-close-history" data-testid="close-history-btn">閉じる</button>
                </div>
            </div>
        </div>

        <!-- =================================
             プレビュー枠 (sticky)
             ================================= -->
        <div class="pp-preview-wrap" data-testid="preview-wrap">
            <div class="photo-frame" id="photo-frame">
                <div class="frame-content" id="frame-content">
                    <video id="camera-video" autoplay playsinline muted webkit-playsinline class="camera-video"></video>
                    <canvas id="overlay-canvas" class="overlay-canvas"></canvas>
                    <canvas id="video-snapshot" class="video-snapshot" data-testid="video-snapshot"></canvas>
                    <div id="placeholder" class="pp-placeholder" data-testid="preview-placeholder">
                        <i class="fas fa-camera" aria-hidden="true"></i>
                        <p>画像を選択してください</p>
                    </div>
                </div>
                <!-- フレーム内テキスト（プレビュー用 / 撮影後も表示し続ける） -->
                <div class="frame-text-layer" id="frame-text-layer">
                    <div class="frame-title" id="frame-title"></div>
                    <div class="frame-meta">
                        <div class="frame-photographer" id="frame-photographer">
                            撮影者:<i class="fa-solid fa-user meta-icon" aria-hidden="true"></i> <span class="meta-text"></span>
                        </div>
                        <div class="frame-date-location" id="frame-date-location">
                            <i class="fa-solid fa-calendar meta-icon" aria-hidden="true"></i><span class="meta-date-text"></span><i class="fa-solid fa-location-dot meta-icon" aria-hidden="true"></i><span class="meta-loc-text"></span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- =================================
             撮影 / 再撮影ボタン
             ================================= -->
        <div class="pp-action-row">
            <button class="primary-btn pp-shutter" id="btn-shutter" data-testid="shutter-btn">
                <i class="fas fa-power-off" id="shutter-icon" aria-hidden="true"></i>
                <span id="shutter-label">カメラを起動</span>
            </button>
        </div>

        <!-- =================================
             入力画像調整 (折りたたみ)
             ================================= -->
        <details class="glass-card pp-details" id="adjust-tile" data-testid="adjust-tile">
            <summary class="pp-summary">
                <span><i class="fas fa-sliders" aria-hidden="true"></i> 入力画像調整</span>
                <i class="fas fa-chevron-right pp-chevron" aria-hidden="true"></i>
            </summary>
            <div class="controls-panel">
                <div class="control-group">
                    <label class="control-label" for="brightness-slider">
                        明るさ
                    </label>
                    <input type="range" id="brightness-slider" class="slider" min="50" max="150" value="100">
                </div>
                <div class="control-group">
                    <label class="control-label" for="contrast-slider">
                        コントラスト
                    </label>
                    <input type="range" id="contrast-slider" class="slider" min="50" max="150" value="100">
                </div>
                <div class="control-group">
                    <label class="control-label" for="temperature-slider">
                        色温度
                    </label>
                    <input type="range" id="temperature-slider" class="slider" min="-100" max="100" value="0">
                </div>
            </div>
        </details>

        <!-- =================================
             メタ情報入力
             ================================= -->
        <div class="glass-card" id="meta-tile" data-testid="meta-tile">
            <div class="form-group">
                <label class="form-label" for="input-title"><i class="fa-solid fa-heading form-icon" aria-hidden="true"></i>タイトル</label>
                <input type="text" id="input-title" class="form-input" placeholder="タイトルを入力" maxlength="40" data-testid="title-input">
            </div>
            <div class="form-group">
                <label class="form-label" for="input-photographer"><i class="fa-solid fa-user form-icon" aria-hidden="true"></i>撮影者</label>
                <input type="text" id="input-photographer" class="form-input" placeholder="撮影者名" data-testid="photographer-input">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label" for="input-date"><i class="fa-solid fa-calendar form-icon" aria-hidden="true"></i>日付</label>
                    <input type="date" id="input-date" class="form-input" data-testid="date-input">
                </div>
                <div class="form-group">
                    <label class="form-label" for="input-location"><i class="fa-solid fa-location-dot form-icon" aria-hidden="true"></i>場所</label>
                    <div class="location-input-wrap">
                        <input type="text" id="input-location" class="form-input" placeholder="場所を入力または取得">
                        <button class="icon-btn" id="btn-get-location" title="位置情報を取得" aria-label="位置情報を取得">
                            <i class="fas fa-location-arrow" aria-hidden="true"></i>
                        </button>
                    </div>
                    <div class="location-suggestions" id="location-suggestions"></div>
                </div>
            </div>
        </div>

        <!-- =================================
             最終アクション: 共有 / PNG保存
             ================================= -->
        <div class="pp-final-actions" data-testid="final-actions">
            <button class="share-btn" id="btn-share" data-testid="share-btn" disabled>
                <i class="fas fa-share-nodes" aria-hidden="true"></i>
                <span>共有</span>
            </button>
            <button class="primary-btn" id="btn-save-png" data-testid="save-png-btn" disabled>
                <i class="fas fa-download" aria-hidden="true"></i>
                <span>PNGで保存</span>
            </button>
        </div>

        <!-- フッター -->
        <footer class="page-footer">
            <p>&copy; 2025 ochoco. All rights reserved.</p>
            <p class="git-commit" id="git-commit"></p>
        </footer>
    </main>

    <!-- ワーニングモーダル -->
    <div id="location-warning-modal" class="modal" style="display:none;" data-testid="location-warning-modal" role="dialog" aria-modal="true" aria-label="撮影場所の警告">
        <div class="modal-overlay"></div>
        <div class="modal-content warning-modal">
            <h3 class="modal-title">
                <i class="fas fa-exclamation-triangle" aria-hidden="true"></i>
                確認
            </h3>
            <p class="modal-text">撮影場所が記録されています。<br>公開してよろしいですか？</p>
            <div class="modal-actions">
                <button class="secondary-btn" id="btn-cancel-warning">キャンセル</button>
                <button class="danger-btn" id="btn-remove-location">場所を削除して進む</button>
                <button class="primary-btn" id="btn-continue-warning">このまま進む</button>
            </div>
        </div>
    </div>

    <!-- JavaScript Modules -->
    <script type="module" src="script.js?v=6"></script>
</body>
</html>
