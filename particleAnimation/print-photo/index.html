<!DOCTYPE html>
<html lang="ja" prefix="og: https://ogp.me/ns#">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PrintPhoto - おちょこ</title>

    <!-- SEO Meta Tags -->
    <meta name="description" content="VRChatアバターを現実世界と合成してフレーム付き写真を作ろう">
    <meta name="keywords" content="おちょこ, ochoco, PrintPhoto, VRChat, グリーンバック, 合成カメラ">
    <meta name="author" content="おちょこ">

    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="PrintPhoto - おちょこ">
    <meta property="og:description" content="VRChatアバターを現実世界と合成してフレーム付き写真を作ろう">
    <meta property="og:image" content="https://fnchoco.com/images/profile.png">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:title" content="PrintPhoto - おちょこ">
    <meta property="twitter:description" content="VRChatアバターを現実世界と合成してフレーム付き写真を作ろう">

    <!-- Theme Color -->
    <meta name="theme-color" content="#141414">

    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,&lt;svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22&gt;&lt;text y=%22.9em%22 font-size=%2290%22&gt;🍫&lt;/text&gt;&lt;/svg&gt;">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- =====================================
         ローディング画面
         ===================================== -->
    <div id="loader" role="status" aria-live="polite" aria-label="ページを読み込んでいます">
        <div class="spinner" aria-hidden="true"></div>
        <p class="loading-text">Loading...</p>
    </div>

    <!-- =====================================
         メインコンテンツ
         ===================================== -->
    <main id="content" style="display:none;" data-testid="main-view">
        <!-- ヘッダー -->
        <header class="page-header">
            <a href="../" class="back-link" aria-label="ポートフォリオに戻る">
                <i class="fas fa-arrow-left" aria-hidden="true"></i>
                <span>Portfolio</span>
            </a>
            <h1 class="page-title">PrintPhoto</h1>
            <p class="page-subtitle">VRChatアバターを現実世界と合成しよう</p>
        </header>

        <!-- =================================
             画面0: トップ（画像選択・カメラ開始）
             ================================= -->
        <section id="screen-top" class="screen active">
            <!-- 画像選択エリア -->
            <div class="glass-card upload-area" id="upload-area">
                <input type="file" id="image-input" accept="image/*" class="hidden-input" data-testid="image-input">
                <label for="image-input" class="upload-label">
                    <i class="fas fa-image upload-icon" aria-hidden="true"></i>
                    <span class="upload-text">画像を選択</span>
                    <span class="upload-hint">グリーンバック画像を読み込みます</span>
                </label>
                <div class="upload-preview" id="upload-preview" data-testid="uploaded-preview"></div>
            </div>

            <!-- サムネイル履歴 -->
            <div class="glass-card thumbnail-section">
                <h2 class="section-title-small">
                    <i class="fas fa-history" aria-hidden="true"></i>
                    履歴から選択
                </h2>
                <div class="thumbnail-grid" id="thumbnail-grid">
                    <p class="empty-text" data-testid="thumbnail-empty">まだ履歴がありません</p>
                </div>
            </div>

            <!-- HTTPS警告 -->
            <div class="glass-card warning-card" id="https-warning" style="display:none;">
                <p><i class="fas fa-lock" aria-hidden="true"></i> カメラを使うにはHTTPS接続が必要です</p>
            </div>

            <!-- カメラ権限ガイダンス -->
            <div class="glass-card warning-card" id="camera-permission-guide" style="display:none;">
                <p><i class="fas fa-info-circle" aria-hidden="true"></i> <span id="camera-permission-text"></span></p>
            </div>

            <!-- カメラ開始ボタン -->
            <button class="primary-btn camera-start-btn" id="camera-start-btn" data-testid="camera-start-btn" disabled>
                <i class="fas fa-camera" aria-hidden="true"></i>
                カメラを起動して合成
            </button>
        </section>

        <!-- =================================
             画面1: カメラ合成ビュー
             ================================= -->
        <section id="screen-compose" class="screen">
            <!-- フレーム -->
            <div class="photo-frame" id="photo-frame">
                <!-- 合成エリア -->
                <div class="frame-content" id="frame-content">
                    <video id="camera-video" autoplay playsinline muted webkit-playsinline class="camera-video"></video>
                    <canvas id="overlay-canvas" class="overlay-canvas"></canvas>
                </div>
                <!-- フレーム内テキスト（プレビュー用） -->
                <div class="frame-text-layer" id="frame-text-layer">
                    <div class="frame-title" id="frame-title"></div>
                    <div class="frame-comment" id="frame-comment"></div>
                    <div class="frame-meta">
                        <span class="frame-photographer" id="frame-photographer"></span>
                        <span class="frame-date-location" id="frame-date-location"></span>
                    </div>
                </div>
            </div>

            <!-- 調整パネル -->
            <div class="controls-panel glass-card">
                <div class="control-group">
                    <label class="control-label">
                        <i class="fas fa-eye-dropper" aria-hidden="true"></i>
                        背景色
                    </label>
                    <div class="color-picker-display" id="color-picker-display">
                        <span class="color-dot" id="color-dot" style="background:#00ff00;"></span>
                        <span class="color-value">タップで色を選択</span>
                    </div>
                </div>
                <div class="control-group">
                    <label class="control-label" for="threshold-slider">
                        透過閾値
                    </label>
                    <input type="range" id="threshold-slider" class="slider" min="0" max="100" value="30" data-testid="threshold-slider">
                </div>
                <div class="control-group">
                    <label class="control-label" for="feather-slider">
                        エッジ柔らかさ
                    </label>
                    <input type="range" id="feather-slider" class="slider" min="0" max="20" value="3">
                </div>
                <div class="control-group">
                    <label class="control-label" for="brightness-slider">
                        明るさ
                    </label>
                    <input type="range" id="brightness-slider" class="slider" min="50" max="150" value="100">
                </div>
                <div class="control-group">
                    <label class="control-label" for="contrast-slider">
                        コントラスト
                    </label>
                    <input type="range" id="contrast-slider" class="slider" min="50" max="150" value="100">
                </div>
            </div>

            <!-- アクションボタン -->
            <div class="action-bar">
                <button class="secondary-btn" id="btn-back-top">
                    <i class="fas fa-arrow-left" aria-hidden="true"></i>
                    戻る
                </button>
                <button class="primary-btn" id="btn-shutter" data-testid="shutter-btn">
                    <i class="fas fa-camera" aria-hidden="true"></i>
                    撮影
                </button>
            </div>
        </section>

        <!-- =================================
             画面2: テキスト入力＆プレビュー
             ================================= -->
        <section id="screen-preview" class="screen">
            <!-- 合成結果プレビュー -->
            <div class="preview-frame" id="preview-frame" data-testid="preview-view">
                <canvas id="result-canvas" class="result-canvas"></canvas>
            </div>

            <!-- 入力フォーム -->
            <div class="glass-card form-card">
                <div class="form-group">
                    <label class="form-label" for="input-title">タイトル</label>
                    <input type="text" id="input-title" class="form-input" placeholder="タイトルを入力" maxlength="40" data-testid="title-input">
                </div>
                <div class="form-group">
                    <label class="form-label" for="input-comment">コメント</label>
                    <textarea id="input-comment" class="form-textarea" placeholder="コメントを入力" rows="2" maxlength="200"></textarea>
                </div>
                <div class="form-group">
                    <label class="form-label" for="input-photographer">撮影者</label>
                    <input type="text" id="input-photographer" class="form-input" placeholder="撮影者名" data-testid="photographer-input">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label" for="input-date">日付</label>
                        <input type="date" id="input-date" class="form-input" data-testid="date-input">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="input-location">
                            <i class="fas fa-map-marker-alt" aria-hidden="true"></i>
                            撮影場所
                        </label>
                        <div class="location-input-wrap">
                            <input type="text" id="input-location" class="form-input" placeholder="場所を入力または取得">
                            <button class="icon-btn" id="btn-get-location" title="位置情報を取得" aria-label="位置情報を取得">
                                <i class="fas fa-location-arrow" aria-hidden="true"></i>
                            </button>
                        </div>
                        <div class="location-suggestions" id="location-suggestions"></div>
                    </div>
                </div>
            </div>

            <!-- 共有・保存ボタン -->
            <div class="action-bar">
                <button class="secondary-btn" id="btn-back-compose">
                    <i class="fas fa-arrow-left" aria-hidden="true"></i>
                    戻る
                </button>
                <div class="action-group">
                    <button class="secondary-btn" id="btn-copy">
                        <i class="fas fa-copy" aria-hidden="true"></i>
                        コピー
                    </button>
                    <button class="share-btn" id="btn-share" data-testid="share-btn">
                        <i class="fas fa-share-nodes" aria-hidden="true"></i>
                        共有
                    </button>
                    <button class="primary-btn" id="btn-save-png">
                        <i class="fas fa-download" aria-hidden="true"></i>
                        保存 (PNG)
                    </button>
                </div>
            </div>
        </section>

        <!-- フッター -->
        <footer class="page-footer">
            <p>&copy; 2025 ochoco. All rights reserved.</p>
        </footer>
    </main>

    <!-- ワーニングモーダル -->
    <div id="location-warning-modal" class="modal" style="display:none;" data-testid="location-warning-modal" role="dialog" aria-modal="true" aria-label="撮影場所の警告">
        <div class="modal-overlay"></div>
        <div class="modal-content warning-modal">
            <h3 class="modal-title">
                <i class="fas fa-exclamation-triangle" aria-hidden="true"></i>
                確認
            </h3>
            <p class="modal-text">撮影場所が記録されています。<br>公開してよろしいですか？</p>
            <div class="modal-actions">
                <button class="secondary-btn" id="btn-cancel-warning">キャンセル</button>
                <button class="danger-btn" id="btn-remove-location">場所を削除して進む</button>
                <button class="primary-btn" id="btn-continue-warning">このまま進む</button>
            </div>
        </div>
    </div>

    <!-- JavaScript Modules -->
    <script type="module" src="script.js"></script>
</body>
</html>
